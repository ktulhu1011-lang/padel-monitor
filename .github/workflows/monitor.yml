name: Padel slot monitor

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

concurrency:
  group: padel-monitor
  cancel-in-progress: false  # не отменять, а ставить в очередь

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install requests urllib3

      - name: Configure git
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

      - name: Check every minute (5 раз)
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_IDS: ${{ secrets.TG_CHAT_IDS }}
        run: |
          for i in 1 2 3 4 5; do
            echo "=== Проверка $i/5 ==="
            git pull --rebase origin main
            python check_slots.py
            git add slots_state.json
            git diff --cached --quiet || git commit -m "update slots state"
            git push
            if [ $i -lt 5 ]; then sleep 60; fi
          done
